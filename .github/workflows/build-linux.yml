# Compila Sajaru Design para Omarchy/Arch Linux en la nube (el dev trabaja en macOS,
# pero el motor usa binarios NATIVOS de Linux — sharp/onnxruntime — así que el
# instalador SIEMPRE se construye acá).
#
# - Manual: pestaña Actions → "Build Linux (Omarchy)" → Run workflow → bajar el artifact.
# - Release: taguear (git tag v0.1.0 && git push --tags) publica AppImage + pacman en
#   GitHub Releases automáticamente.
name: Build Linux (Omarchy)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # El auto-update compara la versión del package con la del release: si taggeás v0.2.0
      # pero package.json sigue en 0.1.0, el updater ve otra versión y entra en loop.
      # Este guard corta el build ANTES de publicar un release roto.
      - name: Verificar tag == versión de ContainerApp/package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./ContainerApp/package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::El tag v$TAG no coincide con ContainerApp/package.json ($PKG). Subí la versión del package y re-taggeá."
            exit 1
          fi

      # bsdtar: lo usa fpm para armar el paquete pacman (.MTREE) — no viene en el runner.
      - name: Dependencias del sistema (bsdtar para el target pacman)
        run: sudo apt-get update -q && sudo apt-get install -y -q libarchive-tools

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            ContainerApp/package-lock.json
            BackgroundRemove/sidecar/package-lock.json

      - name: Motor (sidecar) — deps nativas de Linux + build
        working-directory: BackgroundRemove/sidecar
        run: |
          npm ci
          npm run build

      - name: Typecheck de la app
        working-directory: ContainerApp
        run: |
          npm ci
          npm run typecheck

      - name: App + instaladores (AppImage + pacman)
        working-directory: ContainerApp
        run: |
          npm run build
          npx electron-builder --linux --publish never

      - name: Listar salida
        run: ls -lh "ContainerApp/dist" | grep -E "AppImage|pacman" || ls -lh ContainerApp/dist

      # SOLO en corridas manuales: los artifacts SÍ gastan la cuota de storage de Actions
      # (0.5 GB/mes — un build son ~858 MB), así que en los tags NO subimos artifact: el
      # Release ya lleva los archivos y los assets de Releases NO cuentan contra esa cuota.
      - name: Subir artifacts (solo corridas manuales, retención corta)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: sajaru-design-linux-${{ github.run_number }}
          path: |
            ContainerApp/dist/*.AppImage
            ContainerApp/dist/*.pacman
            ContainerApp/dist/latest-linux.yml
            ContainerApp/dist/*.blockmap
          if-no-files-found: error
          retention-days: 2

      # latest-linux.yml + .blockmap son los que lee electron-updater: SIN ellos en el
      # release, el AppImage no se auto-actualiza (el blockmap habilita descargas delta).
      - name: Publicar Release (solo tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ContainerApp/dist/*.AppImage
            ContainerApp/dist/*.pacman
            ContainerApp/dist/latest-linux.yml
            ContainerApp/dist/*.blockmap
          generate_release_notes: true
